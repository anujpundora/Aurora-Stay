<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay | Aurora Stay Dehradun</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <section class="bg-indigo-600 text-white py-14 text-center">
        <div class="max-w-7xl mx-auto px-6">
            <h1 class="text-3xl md:text-4xl font-bold">
                Book Your Stay at Aurora Stay
            </h1>
        </div>
    </section>
    <section class="py-16">
        <div class="max-w-3xl mx-auto px-6 bg-white shadow-lg rounded-lg p-8">
            <form id="bookingForm" class="space-y-6">
                
                <!-- Name -->
                <div>
                    <label class="block font-medium mb-2">Full Name</label>
                    <input type="text" id="name" required
                    class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                
                <!-- Email -->
                <div>
                    <label class="block font-medium mb-2">Email</label>
                    <input type="email" id="email" required
                    class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                
                <!-- Phone -->
                <div>
                    <label class="block font-medium mb-2">Phone Number</label>
                    <input type="tel" id="phone" required
                    class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                
                <!-- Room Type -->
                <div>
                    <label class="block font-medium mb-2">Select Room</label>
                    <select id="room"
                    class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option>Deluxe Mountain Room</option>
                    <option>Executive Suite</option>
                    <option>Presidential Suite</option>
                </select>
            </div>
            
            <!-- Dates -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block font-medium mb-2">Check-in</label>
                    <input type="date" id="checkin" required
                    class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                
                <div>
                    <label class="block font-medium mb-2">Check-out</label>
                    <input type="date" id="checkout" required
                    class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            
            <!-- Guests -->
            <div>
                <label class="block font-medium mb-2">Number of Guests</label>
                <input type="number" id="guests" min="1" max="5" required
                class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <!-- Submit -->
            <button type="submit"
            class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition font-semibold">
            Confirm Booking
        </button>
        
    </form>
</div>
</section>       
<script src="js/booking.js"></script>
</body>
</html>
